name: EAS Build

# Two ways in:
#   • workflow_dispatch — pick a platform + profile from the Actions "Run workflow"
#     button (ad-hoc dev/preview/production builds).
#   • push of a v*.*.* tag — the house "cut a tag = ship prod" convention: builds
#     production for both platforms (see docs/conventions/CICD.md / KB CICD.md).
#
# Every build runs `--no-wait`: EAS queues the build on its own servers and the
# Actions job returns immediately, so we don't burn CI minutes waiting. Track
# progress on https://expo.dev.
on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform(s) to build
        type: choice
        options:
          - all
          - ios
          - android
        default: all
      profile:
        description: EAS build profile (from eas.json)
        type: choice
        options:
          - development
          - preview
          - production
        default: preview
  push:
    tags:
      - "v*.*.*"

# One in-flight build per ref; don't cancel a running build if another push lands.
concurrency:
  group: eas-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate every build on the same checks as ci.yml — steps mirror ci.yml exactly.
  test:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bunx biome ci .

      - name: Test
        run: bun run test

  build:
    name: EAS build
    needs: test
    runs-on: ubuntu-latest
    steps:
      # Fail early with an actionable message if the Expo token is missing.
      # expo/expo-github-action also errors on a missing token, but this points
      # straight at how to fix it.
      - name: Guard — EXPO_TOKEN must be set
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::EXPO_TOKEN secret is missing. Create an access token at https://expo.dev/accounts/[account]/settings/access-tokens then run: gh secret set EXPO_TOKEN -R Janne6565/wharf-mobile"
            exit 1
          fi

      # Resolve what to build: tag push → production/all; manual run → the inputs.
      - name: Resolve build parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "platform=all" >> "$GITHUB_OUTPUT"
            echo "profile=production" >> "$GITHUB_OUTPUT"
          else
            echo "platform=${{ inputs.platform }}" >> "$GITHUB_OUTPUT"
            echo "profile=${{ inputs.profile }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: bun

      # Default path: dispatch runs, and tag pushes when auto-submit is NOT enabled.
      # --no-wait: EAS builds on its servers; this job doesn't block.
      - name: EAS build
        if: "!(github.event_name == 'push' && vars.EAS_AUTO_SUBMIT == 'true')"
        run: eas build --platform ${{ steps.params.outputs.platform }} --profile ${{ steps.params.outputs.profile }} --non-interactive --no-wait

      # Tag pushes only, and only when the EAS_AUTO_SUBMIT repo variable is "true".
      # Kept as a separate, opt-in step because submit.production in eas.json ships
      # with placeholders — until store credentials are filled in, a tag must still
      # build without failing on a submit. Enable with:
      #   gh variable set EAS_AUTO_SUBMIT --body true -R Janne6565/wharf-mobile
      # --auto-submit queues the store submission on EAS after the build finishes,
      # so it composes with --no-wait (the submit happens server-side).
      - name: EAS build + auto-submit
        if: github.event_name == 'push' && vars.EAS_AUTO_SUBMIT == 'true'
        run: eas build --platform all --profile production --non-interactive --no-wait --auto-submit
