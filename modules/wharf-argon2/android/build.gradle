apply plugin: 'com.android.library'
apply plugin: 'expo-module-gradle-plugin'

group = 'expo.modules.wharfargon2'
version = '0.1.0'

android {
  namespace "expo.modules.wharfargon2"
  defaultConfig {
    minSdkVersion 24
  }
}

dependencies {
  // Native argon2 (JNI) exposing tCost / mCost / parallelism / raw output —
  // the parallelism the Wharf vault requires. Byte-compatible with Go's argon2.
  implementation "com.lambdapioneer.argon2kt:argon2kt:1.6.0"
}
